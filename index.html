const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXAiLCJyZWYiOiJzaXdpdHVsYmJlbGFhbGVqcHpmcSIsInJvbGUiOiJhbm9uIiwiaWF0IjoxNzc4MTIyNTY4LCJleHAiOjIwOTM2OTg1Njh9._hQtItd-HNGZVSPHk1rJJKMNXdLAVsAUtS7c5DVm3Zc";
const SALE_CATS=["อาหาร","กรง/บ้าน","ของเล่น","อุปกรณ์","ตัวสัตว์","อื่นๆ"], EXP_CATS=["ค่าเช่าบูธ","ค่าขนส่ง","ค่าสินค้า/ต้นทุน","ค่าอุปกรณ์","ค่าแรง","อื่นๆ"];
const ADMIN_PIN="2468";
const state={tab:"quick",role:localStorage.getItem("sky_role")||((location.search.includes("staff=1"))?"staff":"admin"),events:[],products:[],sales:[],expenses:[],loading:true,saving:false,cart:[],editEventId:null,editProductId:null,reportView:"event",syncBusy:false};
const $=id=>document.getElementById(id), esc=v=>String(v??"").replace(/[&<>'"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;","'":"&#39;",'"':"&quot;"}[c])), fmt=n=>Number(n||0).toLocaleString("th-TH"), today=()=>new Date().toISOString().slice(0,10);
function thaiMonth(ym){if(!ym||ym==="?")return"ไม่ระบุ";const[y,m]=ym.split("-"),names=["ม.ค.","ก.พ.","มี.ค.","เม.ย.","พ.ค.","มิ.ย.","ก.ค.","ส.ค.","ก.ย.","ต.ค.","พ.ย.","ธ.ค."];return`${names[Number(m)-1]||m} ${Number(y)+543}`}
const db={async request(table,{method="GET",body=null,params=""}={}){const query=method==="GET"?`?select=*&order=created_at.desc${params}`:params;const res=await fetch(`${SUPABASE_URL}/rest/v1/${table}${query}`,{method,headers:{apikey:SUPABASE_KEY,Authorization:`Bearer ${SUPABASE_KEY}`,"Content-Type":"application/json",Prefer:"return=representation"},body:body?JSON.stringify(body):undefined});const text=await res.text(),data=text?JSON.parse(text):null;if(!res.ok){console.error("Supabase error",table,method,data);throw new Error(data?.message||`Supabase ${res.status}`)}return data||[]},get(t){return this.request(t)},post(t,b){return this.request(t,{method:"POST",body:b})},patch(t,id,b){return this.request(t,{method:"PATCH",params:`?id=eq.${encodeURIComponent(id)}`,body:b})},del(t,id){return this.request(t,{method:"DELETE",params:`?id=eq.${encodeURIComponent(id)}`})}};
function toast(msg,type="ok"){$("toastBox").innerHTML=`<div class="toast ${type}">${esc(msg)}</div>`;clearTimeout(window.__toastTimer);window.__toastTimer=setTimeout(()=>$("toastBox").innerHTML="",2500)}function syncStatus(type,text){$("syncStatus").innerHTML=`<span class="sync-dot ${type==="err"?"err":type==="busy"?"busy":""}"></span>${esc(text)}`}
async function loadData(silent=false){if(state.syncBusy)return;state.syncBusy=true;if(!silent)state.loading=true;syncStatus("busy","กำลังซิงก์...");if(!silent)render();try{const[events,products,sales,expenses]=await Promise.all([db.get("events"),db.get("products"),db.get("sales"),db.get("expenses")]);state.events=events||[];state.products=products||[];state.sales=sales||[];state.expenses=expenses||[];syncStatus("ok","ซิงก์อัตโนมัติแล้ว")}catch(e){console.error(e);syncStatus("err","Supabase เชื่อมต่อไม่ได้");if(!silent)toast("โหลด Supabase ไม่สำเร็จ: ตรวจตาราง/RLS/คอลัมน์ใหม่","err")}finally{state.loading=false;state.syncBusy=false;render()}}
async function saveThenSync(action,msg="บันทึกแล้ว ✓"){if(state.saving)return;state.saving=true;render();syncStatus("busy","กำลังบันทึก...");try{await action();await loadData(true);toast(msg)}catch(e){console.error(e);toast("บันทึกไม่สำเร็จ: ตรวจ Supabase / RLS / คอลัมน์ใหม่","err");syncStatus("err","บันทึกไม่สำเร็จ")}finally{state.saving=false;render()}}
function saleNet(s){return Number(s.amount||0)-Number(s.discount_amount||0)}function saleCost(s){return Number(s.cost_amount ?? ((Number(s.cost_price||0))*Number(s.qty||0)) || 0)}
function totals(){const revenue=state.sales.reduce((a,s)=>a+saleNet(s),0), cost=state.sales.reduce((a,s)=>a+saleCost(s),0), expense=state.expenses.reduce((a,x)=>a+Number(x.amount||0),0);return{revenue,cost,expense,profit:revenue-cost-expense}}
function byEvent(){const map={};state.events.forEach(e=>map[e.id]={...e,revenue:0,cost:0,expense:0});state.sales.forEach(s=>{if(map[s.event_id]){map[s.event_id].revenue+=saleNet(s);map[s.event_id].cost+=saleCost(s)}});state.expenses.forEach(x=>{if(map[x.event_id])map[x.event_id].expense+=Number(x.amount||0)});return Object.values(map)}
function byMonth(){const map={};state.sales.forEach(s=>{const m=(s.date||"?").slice(0,7);map[m]||={revenue:0,cost:0,expense:0};map[m].revenue+=saleNet(s);map[m].cost+=saleCost(s)});state.expenses.forEach(x=>{const m=(x.date||"?").slice(0,7);map[m]||={revenue:0,cost:0,expense:0};map[m].expense+=Number(x.amount||0)});return Object.entries(map).sort((a,b)=>b[0].localeCompare(a[0])).map(([month,v])=>({month,...v,profit:v.revenue-v.cost-v.expense}))}
function updateHeader(){const admin=state.role==="admin";$("adminStats").classList.toggle("staff-hide",!admin);$("roleSub").textContent=admin?"ระบบบัญชีบูธ":"โหมดพนักงาน";if(!admin)return;const t=totals();$("sumRevenue").textContent=`฿${fmt(t.revenue)}`;$("sumExpense").textContent=`฿${fmt(t.expense+t.cost)}`;$("sumProfit").textContent=`฿${fmt(t.profit)}`;$("sumProfit").style.color=t.profit>=0?"var(--yellow)":"var(--red)"}
function nav(){const adminTabs=[["quick","⚡ ขายด่วน"],["dashboard","📊 สรุป"],["events","📅 งาน"],["products","📦 สินค้า"],["expenses","🧾 รายจ่าย"],["report","📈 รายงาน"],["mode","👤 โหมด"]], staffTabs=[["quick","⚡ ขาย"],["staffstock","📦 Stock"],["mode","👤 โหมด"]];$("nav").innerHTML=(state.role==="admin"?adminTabs:staffTabs).map(([k,l])=>`<button data-tab="${k}" class="${state.tab===k?"active":""}">${l}</button>`).join("")}
function render(){updateHeader();nav();if(state.loading){$("main").innerHTML=`<div class="loading"><span class="spin"></span>กำลังโหลดข้อมูลจาก Supabase...</div>`;return}if(state.role==="staff"&&!["quick","staffstock","mode"].includes(state.tab))state.tab="quick";const views={quick:renderQuick,dashboard:renderDashboard,events:renderEvents,products:renderProducts,expenses:renderExpenses,report:renderReport,staffstock:renderStaffStock,mode:renderMode};$("main").innerHTML=views[state.tab]()}
function field(id,label,value="",type="text",placeholder=""){return`<div class="field"><label>${label}</label><input id="${id}" type="${type}" value="${esc(value)}" placeholder="${esc(placeholder)}"></div>`}function selectField(id,label,options,value=""){return`<div class="field"><label>${label}</label><select id="${id}">${options.map(o=>`<option value="${esc(o.value)}" ${String(o.value)===String(value)?"selected":""}>${esc(o.label)}</option>`).join("")}</select></div>`}
function renderQuick(){const cats=[...new Set(state.products.map(p=>p.category||"อื่นๆ"))],eventOpts=[{value:"",label:"– เลือกงาน –"},...state.events.map(e=>({value:e.id,label:e.name}))],currentEvent=localStorage.getItem("sky_event_id")||"",saleDate=localStorage.getItem("sky_sale_date")||today(),discount=Number(localStorage.getItem("sky_discount")||0),total=state.cart.reduce((s,x)=>s+Number(x.unit_price||0)*Number(x.qty||0),0),net=Math.max(total-discount,0);return`<section><h2 class="section-title">⚡ ขายด่วน</h2><div class="grid">${selectField("quickEvent","งาน",eventOpts,currentEvent)}${field("saleDate","วันที่",saleDate,"date")}</div><div class="sub-title">เลือกสินค้า</div>${state.products.length===0?`<div class="empty">ยังไม่มีสินค้า → ไปเพิ่มในแท็บ 📦 สินค้าก่อน</div>`:""}${cats.map(cat=>`<div class="cat-label">${esc(cat)}</div><div class="product-grid">${state.products.filter(p=>(p.category||"อื่นๆ")===cat).map(p=>`<button class="product-btn" onclick="addToCart('${esc(p.id)}')"><div class="product-name">${esc(p.name)}</div><div class="product-price">฿${fmt(p.unit_price)}${Number(p.unit_price||0)===0?" / กรอกเอง":""}</div><div class="product-stock">คงเหลือ ${fmt(p.stock_qty)}</div></button>`).join("")}</div>`).join("")}${state.cart.length?`<div class="cart"><div class="cart-title">🛒 ตะกร้า</div>${state.cart.map(item=>`<div class="cart-row"><div class="cart-item">${esc(item.name)}<div class="field" style="margin-top:6px"><input type="number" value="${Number(item.unit_price||0)}" min="0" step="1" onchange="setItemPrice('${esc(item.id)}',this.value)" placeholder="ราคาขายจริง"></div></div><div class="qty"><button onclick="changeQty('${esc(item.id)}',-1)">−</button><span>${item.qty}</span><button onclick="changeQty('${esc(item.id)}',1)">+</button></div><div class="cart-price">฿${fmt(Number(item.unit_price)*item.qty)}</div></div>`).join("")}<div class="grid">${field("saleDiscount","ส่วนลดทั้งบิล (฿)",discount,"number","0")}</div><div class="cart-total">ยอดก่อนลด ฿${fmt(total)}<br>สุทธิ ฿${fmt(net)}</div><div class="btn-row"><button class="btn" onclick="checkout(false)" ${state.saving?"disabled":""}>✓ บันทึกขาย</button><button class="btn outline" onclick="checkout(true)" ${state.saving?"disabled":""}>🧾 บันทึก + ออกบิล</button><button class="btn ghost" onclick="clearCart()">ล้าง</button></div></div>`:""}</section>`}
function addToCart(id){const p=state.products.find(x=>String(x.id)===String(id));if(!p)return;const ex=state.cart.find(x=>String(x.id)===String(id));if(ex)ex.qty++;else state.cart.push({...p,qty:1,unit_price:Number(p.unit_price||0),cost_price:Number(p.cost_price||0)});render()}function setItemPrice(id,v){const it=state.cart.find(x=>String(x.id)===String(id));if(it)it.unit_price=Number(v)||0;render()}function changeQty(id,d){const it=state.cart.find(x=>String(x.id)===String(id));if(!it)return;it.qty+=d;if(it.qty<=0)state.cart=state.cart.filter(x=>String(x.id)!==String(id));render()}function clearCart(){state.cart=[];localStorage.setItem("sky_discount","0");render()}
async function checkout(printBill=false){const eventId=$("quickEvent")?.value,date=$("saleDate")?.value||today();localStorage.setItem("sky_event_id",eventId||"");localStorage.setItem("sky_sale_date",date);if(!eventId)return toast("เลือกงานก่อน","err");if(state.cart.length===0)return toast("ยังไม่ได้เลือกสินค้า","err");const discount=Number($("saleDiscount")?.value||0);localStorage.setItem("sky_discount",String(discount));const billCart=state.cart.map(x=>({...x})),total=billCart.reduce((s,x)=>s+Number(x.unit_price||0)*x.qty,0),ev=state.events.find(e=>String(e.id)===String(eventId));await saveThenSync(async()=>{for(let i=0;i<billCart.length;i++){const item=billCart[i],lineAmount=(Number(item.unit_price)||0)*item.qty,lineDiscount=total>0?discount*(lineAmount/total):0;await db.post("sales",{event_id:eventId,date,item:item.name,category:item.category||"อื่นๆ",qty:item.qty,unit_price:Number(item.unit_price)||0,amount:lineAmount,discount_amount:lineDiscount,cost_price:Number(item.cost_price)||0,cost_amount:(Number(item.cost_price)||0)*item.qty,product_id:item.id});const newStock=Number(item.stock_qty||0)-Number(item.qty||0);await db.patch("products",item.id,{stock_qty:newStock})}state.cart=[];localStorage.setItem("sky_discount","0")},"บันทึกขายและตัดสต็อกแล้ว ✓");if(printBill)showBill({cart:billCart,total,discount,net:Math.max(total-discount,0),date,event:ev})}
function showBill(data){const billNo=`INV-${String(Date.now()).slice(-6)}`;$("modalBox").innerHTML=`<div class="modal"><div class="bill-wrap"><div class="bill"><div class="bill-header"><div class="bill-shop">🐹 Sky House</div><div class="bill-sub">Pet Supply</div><div class="bill-meta">เลขที่: ${billNo}</div><div class="bill-meta">วันที่: ${esc(data.date)}</div>${data.event?`<div class="bill-meta">งาน: ${esc(data.event.name)}</div>`:""}</div><div class="bill-divider"></div>${data.cart.map(item=>`<div class="bill-row"><div style="flex:1;font-size:13px">${esc(item.name)}</div><div style="font-size:13px;color:#64748b">x${item.qty}</div><div style="font-size:13px;min-width:70px;text-align:right">฿${fmt(Number(item.unit_price)*item.qty)}</div></div>`).join("")}<div class="bill-divider"></div><div class="bill-total">ยอดก่อนลด ฿${fmt(data.total)}</div>${data.discount?`<div class="bill-total" style="font-size:14px;color:#64748b">ส่วนลด -฿${fmt(data.discount)}</div>`:""}<div class="bill-total">สุทธิ ฿${fmt(data.net)}</div><div class="bill-thank">ขอบคุณที่อุดหนุนค่ะ 🙏</div></div><div class="btn-row"><button class="btn" onclick="window.print()">🖨️ พิมพ์บิล</button><button class="btn ghost" onclick="closeModal()">ปิด</button></div></div></div>`}function closeModal(){$("modalBox").innerHTML=""}
function renderDashboard(){const be=byEvent(),bm=byMonth();return`<section><h2 class="section-title">📊 สรุปแต่ละงาน</h2><div class="cards">${be.length?be.map(e=>{const p=e.revenue-e.cost-e.expense;return`<div class="card"><div class="card-name">${esc(e.name)}</div><div class="card-venue">${esc(e.venue||"")}</div><div class="card-nums"><span style="color:var(--green)">ขาย ฿${fmt(e.revenue)}</span><span style="color:var(--red)">ต้นทุน+จ่าย ฿${fmt(e.cost+e.expense)}</span></div><div class="card-profit" style="color:${p>=0?'var(--yellow)':'var(--red)'}">กำไร ฿${fmt(p)}</div></div>`}).join(""):`<div class="empty">ยังไม่มีข้อมูลงาน</div>`}</div><h2 class="section-title" style="margin-top:28px">สรุปรายเดือน</h2>${monthTable(bm)}</section>`}
function monthTable(bm){return`<div class="table-wrap"><table class="table"><thead><tr><th>เดือน</th><th>รายรับสุทธิ</th><th>ต้นทุนสินค้า</th><th>รายจ่าย</th><th>กำไร</th></tr></thead><tbody>${bm.length?bm.map(m=>`<tr><td>${thaiMonth(m.month)}</td><td style="color:var(--green)">฿${fmt(m.revenue)}</td><td style="color:var(--red)">฿${fmt(m.cost)}</td><td style="color:var(--red)">฿${fmt(m.expense)}</td><td style="color:${m.profit>=0?'var(--yellow)':'var(--red)'};font-weight:900">฿${fmt(m.profit)}</td></tr>`).join(""):`<tr><td class="center" colspan="5">ยังไม่มีข้อมูล</td></tr>`}</tbody></table></div>`}
function renderEvents(){const edit=state.events.find(e=>String(e.id)===String(state.editEventId));return`<section><h2 class="section-title">${edit?"✏️ แก้ไขงาน":"➕ เพิ่มงาน"}</h2><div class="grid">${field("evName","ชื่องาน *",edit?.name||"","text","เช่น Pet Expo")} ${field("evVenue","สถานที่ *",edit?.venue||"","text","เช่น Central Westville")} ${field("evStart","วันเริ่ม",edit?.start_date||today(),"date")} ${field("evEnd","วันสิ้นสุด",edit?.end_date||today(),"date")} ${field("evNote","หมายเหตุ",edit?.note||"","text","ไม่บังคับ")}</div><div class="btn-row"><button class="btn" onclick="saveEvent()" ${state.saving?"disabled":""}>${edit?"บันทึกการแก้ไข":"เพิ่มงาน"}</button>${edit?`<button class="btn ghost" onclick="cancelEdit()">ยกเลิก</button>`:""}</div><div class="table-wrap"><table class="table"><thead><tr><th>ชื่องาน</th><th>สถานที่</th><th>วันที่</th><th></th></tr></thead><tbody>${state.events.length?state.events.map(e=>`<tr><td>${esc(e.name)}</td><td>${esc(e.venue)}</td><td>${esc(e.start_date||"")}</td><td><button class="icon-btn" onclick="editEvent('${esc(e.id)}')">✏️</button><button class="icon-btn" onclick="deleteRow('events','${esc(e.id)}')">🗑️</button></td></tr>`).join(""):`<tr><td class="center" colspan="4">ยังไม่มีงาน</td></tr>`}</tbody></table></div></section>`}function editEvent(id){state.editEventId=id;render();scrollTo({top:0,behavior:"smooth"})}function cancelEdit(){state.editEventId=null;state.editProductId=null;render()}async function saveEvent(){const name=$("evName").value.trim(),venue=$("evVenue").value.trim();if(!name)return toast("กรอกชื่องาน","err");if(!venue)return toast("กรอกสถานที่","err");const row={name,venue,start_date:$("evStart").value||today(),end_date:$("evEnd").value||today(),note:$("evNote").value||""};await saveThenSync(async()=>{state.editEventId?await db.patch("events",state.editEventId,row):await db.post("events",row);state.editEventId=null},state.editEventId?"แก้ไขงานแล้ว ✓":"เพิ่มงานแล้ว ✓")}
function renderProducts(){const edit=state.products.find(p=>String(p.id)===String(state.editProductId)),catOpts=SALE_CATS.map(c=>({value:c,label:c}));return`<section><h2 class="section-title">${edit?"✏️ แก้ไขสินค้า":"➕ เพิ่มสินค้า"}</h2><div class="grid">${field("prName","ชื่อสินค้า",edit?.name||"","text","นกแก้ว / อาหาร / ของเล่น")} ${selectField("prCat","หมวดหมู่",catOpts,edit?.category||SALE_CATS[0])} ${field("prPrice","ราคาขายตั้งต้น (฿) — ใส่ 0 ถ้าราคาไม่ตายตัว",edit?.unit_price||"","number","0")} ${field("prCost","ต้นทุนต่อชิ้น (฿)",edit?.cost_price||"","number","0")} ${field("prStock","สต็อก",edit?.stock_qty||"","number","0")}</div><div class="btn-row"><button class="btn" onclick="saveProduct()" ${state.saving?"disabled":""}>${edit?"บันทึกการแก้ไข":"เพิ่มสินค้า"}</button>${edit?`<button class="btn ghost" onclick="cancelEdit()">ยกเลิก</button>`:""}</div><div class="table-wrap"><table class="table"><thead><tr><th>ชื่อสินค้า</th><th>หมวด</th><th>ราคาตั้งต้น</th><th>ต้นทุน</th><th>สต็อก</th><th></th></tr></thead><tbody>${state.products.length?state.products.map(p=>`<tr><td>${esc(p.name)}</td><td>${esc(p.category)}</td><td style="color:var(--green)">฿${fmt(p.unit_price)}</td><td style="color:var(--red)">฿${fmt(p.cost_price)}</td><td>${fmt(p.stock_qty)}</td><td><button class="icon-btn" onclick="editProduct('${esc(p.id)}')">✏️</button><button class="icon-btn" onclick="deleteRow('products','${esc(p.id)}')">🗑️</button></td></tr>`).join(""):`<tr><td class="center" colspan="6">ยังไม่มีสินค้า</td></tr>`}</tbody></table></div></section>`}function editProduct(id){state.editProductId=id;render();scrollTo({top:0,behavior:"smooth"})}async function saveProduct(){const name=$("prName").value.trim();if(!name)return toast("กรอกชื่อสินค้า","err");const row={name,category:$("prCat").value,unit_price:Number($("prPrice").value)||0,cost_price:Number($("prCost").value)||0,stock_qty:Number($("prStock").value)||0};await saveThenSync(async()=>{state.editProductId?await db.patch("products",state.editProductId,row):await db.post("products",row);state.editProductId=null},state.editProductId?"แก้ไขสินค้าแล้ว ✓":"เพิ่มสินค้าแล้ว ✓")}
function renderExpenses(){const eventOpts=[{value:"",label:"– เลือกงาน –"},...state.events.map(e=>({value:e.id,label:e.name}))],expOpts=EXP_CATS.map(c=>({value:c,label:c}));return`<section><h2 class="section-title">🧾 บันทึกรายจ่าย</h2><div class="grid">${selectField("exEvent","งาน",eventOpts,localStorage.getItem("sky_event_id")||"")} ${field("exDate","วันที่",today(),"date")} ${field("exItem","รายการ","","text","ค่าเช่าบูธ")} ${selectField("exCat","หมวดหมู่",expOpts,EXP_CATS[0])} ${field("exAmount","จำนวนเงิน (฿)","","number","0")} ${field("exNote","หมายเหตุ","","text","ไม่บังคับ")}</div><div class="btn-row"><button class="btn" onclick="saveExpense()" ${state.saving?"disabled":""}>บันทึกรายจ่าย</button></div><div class="table-wrap"><table class="table"><thead><tr><th>วันที่</th><th>งาน</th><th>รายการ</th><th>หมวด</th><th>จำนวน</th><th></th></tr></thead><tbody>${state.expenses.length?state.expenses.map(x=>`<tr><td>${esc(x.date)}</td><td>${esc(state.events.find(e=>String(e.id)===String(x.event_id))?.name||"-")}</td><td>${esc(x.item)}</td><td>${esc(x.category)}</td><td style="color:var(--red)">฿${fmt(x.amount)}</td><td><button class="icon-btn" onclick="deleteRow('expenses','${esc(x.id)}')">🗑️</button></td></tr>`).join(""):`<tr><td class="center" colspan="6">ยังไม่มีรายการ</td></tr>`}</tbody></table></div></section>`}async function saveExpense(){const event_id=$("exEvent").value;if(!event_id)return toast("เลือกงานก่อน","err");const item=$("exItem").value.trim(),amount=Number($("exAmount").value)||0;if(!item||!amount)return toast("กรอกรายการและจำนวนเงิน","err");localStorage.setItem("sky_event_id",event_id);await saveThenSync(async()=>db.post("expenses",{event_id,date:$("exDate").value||today(),item,category:$("exCat").value,amount,note:$("exNote").value||""}),"บันทึกรายจ่ายแล้ว ✓")}
function renderReport(){const be=byEvent(),bm=byMonth(),top={};state.sales.forEach(s=>{top[s.item]||={name:s.item,qty:0,revenue:0,cost:0};top[s.item].qty+=Number(s.qty||0);top[s.item].revenue+=saleNet(s);top[s.item].cost+=saleCost(s)});const topProducts=Object.values(top).sort((a,b)=>b.revenue-a.revenue).slice(0,10);return`<section><h2 class="section-title">📈 รายงานสรุป</h2><div class="btn-row">${[["event","แยกตามงาน"],["month","แยกตามเดือน"],["product","สินค้าขายดี"]].map(([k,l])=>`<button class="btn ${state.reportView===k?'':'ghost'}" onclick="setReport('${k}')">${l}</button>`).join("")}</div>${state.reportView==="event"?reportCards(be.map(e=>({title:e.name,sub:`${e.venue||""} · ${e.start_date||""}`,revenue:e.revenue,cost:e.cost,expense:e.expense,profit:e.revenue-e.cost-e.expense}))):state.reportView==="month"?reportCards(bm):productReport(topProducts)}</section>`}function setReport(k){state.reportView=k;render()}function reportCards(items){if(!items.length)return`<div class="empty">ยังไม่มีข้อมูล</div>`;return items.map(x=>{const margin=x.revenue?((x.profit/x.revenue)*100).toFixed(1):0;return`<div class="report-card"><div class="report-title">${esc(x.title||thaiMonth(x.month))}</div><div class="report-venue">${esc(x.sub||"")}</div><div class="report-row"><div class="rstat"><div class="rval" style="color:var(--green)">฿${fmt(x.revenue)}</div><div class="rlab">รายรับสุทธิ</div></div><div class="rstat"><div class="rval" style="color:var(--red)">฿${fmt(x.cost)}</div><div class="rlab">ต้นทุนสินค้า</div></div><div class="rstat"><div class="rval" style="color:var(--red)">฿${fmt(x.expense)}</div><div class="rlab">รายจ่าย</div></div><div class="rstat"><div class="rval" style="color:${x.profit>=0?'var(--yellow)':'var(--red)'}">฿${fmt(x.profit)}</div><div class="rlab">กำไร</div></div></div><div class="bar"><div class="bar-fill" style="width:${Math.min(Math.abs(margin),100)}%;background:${x.profit>=0?'var(--green)':'var(--red)'}"></div></div></div>`}).join("")}function productReport(items){return`<div class="table-wrap"><table class="table"><thead><tr><th>สินค้า</th><th>จำนวนที่ขาย</th><th>ยอดขายสุทธิ</th><th>ต้นทุน</th><th>กำไรขั้นต้น</th></tr></thead><tbody>${items.length?items.map(p=>`<tr><td>${esc(p.name)}</td><td>${fmt(p.qty)}</td><td style="color:var(--green)">฿${fmt(p.revenue)}</td><td style="color:var(--red)">฿${fmt(p.cost)}</td><td style="color:var(--yellow)">฿${fmt(p.revenue-p.cost)}</td></tr>`).join(""):`<tr><td class="center" colspan="5">ยังไม่มีข้อมูล</td></tr>`}</tbody></table></div>`}
function renderStaffStock(){return`<section><h2 class="section-title">📦 Stock คงเหลือ</h2><div class="table-wrap"><table class="table"><thead><tr><th>สินค้า</th><th>หมวด</th><th>สต็อก</th></tr></thead><tbody>${state.products.length?state.products.map(p=>`<tr><td>${esc(p.name)}</td><td>${esc(p.category)}</td><td>${fmt(p.stock_qty)}</td></tr>`).join(""):`<tr><td class="center" colspan="3">ยังไม่มีสินค้า</td></tr>`}</tbody></table></div></section>`}
function renderMode(){return`<section><h2 class="section-title">👤 โหมดการใช้งาน</h2><div class="card"><div class="card-name">ตอนนี้: ${state.role==="admin"?"แอดมิน":"พนักงาน"}</div><div class="card-venue">${state.role==="staff"?"พนักงานจะไม่เห็นต้นทุน กำไร รายจ่าย และรายงาน":"แอดมินเห็นข้อมูลทั้งหมด"}</div><div class="btn-row">${state.role==="admin"?`<button class="btn ghost" onclick="switchStaff()">เข้าโหมดพนักงาน</button>`:`<button class="btn" onclick="switchAdmin()">กลับโหมดแอดมิน</button>`}</div></div></section>`}
function switchStaff(){state.role="staff";state.tab="quick";localStorage.setItem("sky_role","staff");render()}function switchAdmin(){const pin=prompt("ใส่รหัสแอดมิน");if(pin!==ADMIN_PIN)return toast("รหัสไม่ถูกต้อง","err");state.role="admin";state.tab="dashboard";localStorage.setItem("sky_role","admin");render()}
async function deleteRow(table,id){if(state.role!=="admin")return toast("เฉพาะแอดมิน","err");if(!confirm("ลบรายการนี้?"))return;await saveThenSync(async()=>db.del(table,id),"ลบแล้ว")}
document.getElementById("nav").addEventListener("click",e=>{const b=e.target.closest("button[data-tab]");if(!b)return;state.tab=b.dataset.tab;render();scrollTo({top:0,behavior:"smooth"})});document.addEventListener("change",e=>{if(e.target.id==="quickEvent")localStorage.setItem("sky_event_id",e.target.value||"");if(e.target.id==="saleDate")localStorage.setItem("sky_sale_date",e.target.value||today());if(e.target.id==="saleDiscount")localStorage.setItem("sky_discount",e.target.value||"0")});document.addEventListener("visibilitychange",()=>{if(!document.hidden)loadData(true)});addEventListener("focus",()=>loadData(true));loadData(false);setInterval(()=>loadData(true),8000);
</script>
